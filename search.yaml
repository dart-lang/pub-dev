runtime: custom
env: flex
service: search

resources:
  cpu: 8
  # This is the max memory we can request for 8 cpus.
  # https://cloud.google.com/appengine/docs/flexible/reference/app-yaml?tab=python
  memory_gb: 51.6
  disk_size_gb: 25

#manual_scaling:
#  instances: 1

automatic_scaling:
  min_num_instances: 10
  max_num_instances: 30
  # The service does most of the work on a single-core CPU, and because of that, the utilization
  # metrics is usually under 0.05. Full single-core utilization is about 0.125, and with the
  # isolate-switching mechanism it goes up to 0.20.
  cpu_utilization:
    target_utilization: 0.08

skip_files:
- ^\.git/.*$

liveness_check:
  path: '/liveness_check'

readiness_check:
  path: '/readiness_check'
  check_interval_sec: 15
  app_start_timeout_sec: 1800
